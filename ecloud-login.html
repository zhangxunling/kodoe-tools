<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七牛云存储 Ecloud 聚合平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        h1 {
            text-align: center;
            color: #f1f5f9;
            margin-bottom: 8px;
            font-size: 2.4em;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
            font-size: 1em;
        }
        .header-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.5);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        .cluster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }
        .cluster-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        .cluster-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cluster-card:hover {
            transform: translateY(-8px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(139, 92, 246, 0.1);
        }
        .cluster-card:hover::before {
            opacity: 1;
        }
        .cluster-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .cluster-id {
            color: #8b5cf6;
            font-size: 0.75em;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: rgba(139, 92, 246, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .delete-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1.2em;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }
        .edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .edit-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        .header-btns {
            display: flex;
            gap: 4px;
        }
        .cluster-name {
            color: #f1f5f9;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .cluster-url {
            color: #64748b;
            font-size: 0.85em;
            margin-bottom: 20px;
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .cluster-creds {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .cred-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .cred-row:last-child {
            margin-bottom: 0;
        }
        .cred-label {
            color: #64748b;
            font-size: 0.8em;
            width: 70px;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .cred-value {
            color: #e2e8f0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9em;
        }
        .copy-btn {
            background: rgba(59, 130, 246, 0.15);
            border: none;
            color: #60a5fa;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75em;
            margin-left: 8px;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: rgba(59, 130, 246, 0.25);
        }
        .toggle-pwd-btn {
            background: rgba(139, 92, 246, 0.15);
            border: none;
            color: #a78bfa;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            margin-left: 4px;
            transition: all 0.2s;
        }
        .toggle-pwd-btn:hover {
            background: rgba(139, 92, 246, 0.25);
        }
        .password-hidden {
            letter-spacing: 2px;
        }
        .login-btn {
            display: inline-block;
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95em;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }
        .empty-state h3 {
            color: #94a3b8;
            margin-bottom: 12px;
            font-size: 1.3em;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 36px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }
        .modal h2 {
            color: #f1f5f9;
            margin-bottom: 24px;
            font-size: 1.6em;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9em;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.2s;
            color: #f1f5f9;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .form-group input::placeholder {
            color: #475569;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .modal-actions .btn {
            flex: 1;
            padding: 14px 20px;
        }
        .footer {
            text-align: center;
            color: #475569;
            margin-top: 60px;
            font-size: 0.85em;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            padding: 14px 28px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .toast.show {
            opacity: 1;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ 七牛云存储 Ecloud 聚合平台</h1>
        <p class="subtitle" id="cluster-count">共 0 个集群</p>
        
        <div class="header-actions">
            <button class="btn btn-primary" onclick="openAddModal()">+ 添加集群</button>
            <button class="btn btn-secondary" onclick="exportData()">导出数据</button>
            <button class="btn btn-secondary" onclick="importData()">导入数据</button>
        </div>
        
        <div class="cluster-grid" id="cluster-grid">
            <!-- 集群卡片将动态生成 -->
        </div>
        
        <div class="empty-state" id="empty-state" style="display: none;">
            <h3>暂无集群</h3>
            <p>点击上方"添加集群"按钮开始</p>
        </div>
        
        <div class="footer">
            <p>数据保存在本地浏览器 · 可导出备份</p>
        </div>
    </div>

    <!-- 添加/编辑集群模态框 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">添加集群</h2>
            <form id="cluster-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>集群名称 *</label>
                    <input type="text" id="cluster-name" placeholder="例如：生产环境-北京" required>
                </div>
                <div class="form-group">
                    <label>集群ID</label>
                    <input type="text" id="cluster-id" placeholder="例如：BJ-PROD-01">
                </div>
                <div class="form-group">
                    <label>登录地址 *</label>
                    <input type="url" id="cluster-url" placeholder="https://cluster.example.com" required>
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="cluster-username" placeholder="登录用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="cluster-password" placeholder="登录密码">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="cluster-note" placeholder="其他说明">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

    <script>
        const STORAGE_KEY = 'ecloud-clusters';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderClusters();
        });
        
        // 获取集群数据
        function getClusters() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        // 保存集群数据
        function saveClusters(clusters) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(clusters));
            renderClusters();
        }
        
        // 渲染集群列表
        function renderClusters() {
            const clusters = getClusters();
            const grid = document.getElementById('cluster-grid');
            const emptyState = document.getElementById('empty-state');
            const countEl = document.getElementById('cluster-count');
            
            countEl.textContent = `共 ${clusters.length} 个集群`;
            
            if (clusters.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            grid.innerHTML = clusters.map((cluster, index) => `
                <div class="cluster-card">
                    <div class="cluster-header">
                        <span class="cluster-id">${escapeHtml(cluster.clusterId || 'CLUSTER-' + (index + 1))}</span>
                        <div class="header-btns">
                            <button class="edit-btn" onclick="openEditModal('${cluster.id}')" title="编辑">✏️</button>
                            <button class="delete-btn" onclick="deleteCluster('${cluster.id}')" title="删除">×</button>
                        </div>
                    </div>
                    <div class="cluster-name">${escapeHtml(cluster.name)}</div>
                    <div class="cluster-url">${escapeHtml(cluster.url)}</div>
                    ${cluster.username || cluster.password ? `
                    <div class="cluster-creds">
                        ${cluster.username ? `
                        <div class="cred-row">
                            <span class="cred-label">用户名:</span>
                            <span class="cred-value">${escapeHtml(cluster.username)}</span>
                            <button class="copy-btn" onclick="copyText('${escapeHtml(cluster.username)}')">复制</button>
                        </div>
                        ` : ''}
                        ${cluster.password ? `
                        <div class="cred-row">
                            <span class="cred-label">密码:</span>
                            <span class="cred-value" id="pwd-${cluster.id}">••••••••</span>
                            <button class="toggle-pwd-btn" data-pwd="${escapeHtml(cluster.password).replace(/"/g, '&quot;')}" onclick="togglePwd(this, '${cluster.id}')" title="显示/隐藏">👁</button>
                            <button class="copy-btn" data-pwd="${escapeHtml(cluster.password).replace(/"/g, '&quot;')}" onclick="copyPwd(this)" title="复制">复制</button>
                        </div>
                        ` : ''}
                        ${cluster.note ? `
                        <div class="cred-row">
                            <span class="cred-label">备注:</span>
                            <span class="cred-value">${escapeHtml(cluster.note)}</span>
                        </div>
                        ` : ''}
                    </div>
                    ` : ''}
                    <a href="${escapeHtml(cluster.url)}" class="login-btn" target="_blank" rel="noopener noreferrer" data-pwd="${btoa(cluster.password || '')}" onclick="return handleLogin(this)">登录入口</a>
                </div>
            `).join('');
        }
        
        // HTML转义
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }
        
        // 打开添加模态框
        function openAddModal() {
            document.getElementById('modal-title').textContent = '添加集群';
            document.getElementById('edit-id').value = '';
            document.getElementById('cluster-form').reset();
            document.getElementById('modal-overlay').classList.add('active');
        }
        
        // 打开编辑模态框
        function openEditModal(id) {
            const clusters = getClusters();
            const cluster = clusters.find(c => c.id === id);
            if (!cluster) return;
            
            document.getElementById('modal-title').textContent = '编辑集群';
            document.getElementById('edit-id').value = id;
            document.getElementById('cluster-name').value = cluster.name;
            document.getElementById('cluster-id').value = cluster.clusterId || '';
            document.getElementById('cluster-url').value = cluster.url;
            document.getElementById('cluster-username').value = cluster.username || '';
            document.getElementById('cluster-password').value = cluster.password || '';
            document.getElementById('cluster-note').value = cluster.note || '';
            document.getElementById('modal-overlay').classList.add('active');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }
        
        // 表单提交
        document.getElementById('cluster-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const editId = document.getElementById('edit-id').value;
            const cluster = {
                id: editId || Date.now().toString(),
                name: document.getElementById('cluster-name').value.trim(),
                clusterId: document.getElementById('cluster-id').value.trim(),
                url: document.getElementById('cluster-url').value.trim(),
                username: document.getElementById('cluster-username').value.trim(),
                password: document.getElementById('cluster-password').value.trim(),
                note: document.getElementById('cluster-note').value.trim()
            };
            
            const clusters = getClusters();
            
            if (editId) {
                const index = clusters.findIndex(c => c.id === editId);
                if (index !== -1) {
                    clusters[index] = cluster;
                }
            } else {
                clusters.push(cluster);
            }
            
            saveClusters(clusters);
            closeModal();
            showToast(editId ? '集群已更新' : '集群已添加');
        });
        
        // 删除集群
        function deleteCluster(id) {
            if (!confirm('确定要删除这个集群吗？')) return;
            
            const clusters = getClusters().filter(c => c.id !== id);
            saveClusters(clusters);
            showToast('集群已删除');
        }
        
        // 复制文本
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败');
            });
        }
        
        // 复制密码 (从data属性读取)
        function copyPwd(btn) {
            const pwd = btn.getAttribute('data-pwd');
            copyText(pwd);
        }
        
        // 切换密码显示 (从data属性读取)
        function togglePwd(btn, id) {
            const el = document.getElementById('pwd-' + id);
            const pwd = btn.getAttribute('data-pwd');
            if (el.textContent === '••••••••') {
                el.textContent = pwd;
                btn.textContent = '🙈';
            } else {
                el.textContent = '••••••••';
                btn.textContent = '👁';
            }
        }
        
        // 处理登录跳转
        function handleLogin(btn) {
            const url = btn.getAttribute('href');
            const pwdBase64 = btn.getAttribute('data-pwd');
            const password = pwdBase64 ? atob(pwdBase64) : '';
            
            // 验证URL
            if (!url || url === 'undefined' || url === 'null' || url === 'javascript:void(0)') {
                showToast('请先配置登录地址');
                return false; // 阻止链接跳转
            }
            
            // 如果有密码，先复制到剪贴板
            if (password) {
                navigator.clipboard.writeText(password).then(() => {
                    showToast('密码已复制到剪贴板');
                }).catch(() => {
                    showToast('密码复制失败，请手动复制');
                });
            }
            
            return true; // 允许链接跳转
        }
        
        // 导出数据
        function exportData() {
            const clusters = getClusters();
            const dataStr = JSON.stringify(clusters, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ecloud-clusters-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出');
        }
        
        // 导入数据
        function importData() {
            document.getElementById('import-file').click();
        }
        
        // 处理导入
        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) {
                        throw new Error('无效的数据格式');
                    }
                    
                    const existing = getClusters();
                    const merged = [...existing];
                    let addedCount = 0;
                    
                    imported.forEach(cluster => {
                        if (cluster.id && cluster.name && cluster.url) {
                            const exists = merged.find(c => c.id === cluster.id);
                            if (!exists) {
                                merged.push(cluster);
                                addedCount++;
                            }
                        }
                    });
                    
                    saveClusters(merged);
                    if (addedCount === 0) {
                        showToast('无新集群需要导入（可能已存在）');
                    } else {
                        showToast(`已导入 ${addedCount} 个新集群`);
                    }
                } catch (err) {
                    showToast('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 点击模态框外部关闭
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') {
                closeModal();
            }
        });
    </script>
</body>
</html>
